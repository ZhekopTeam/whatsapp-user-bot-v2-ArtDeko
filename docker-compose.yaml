x-bot-common: &bot-common
  build:
    context: .
    dockerfile: DockerFile
  image: zhekop/wh-user-bot-v2-artdeko:main
  env_file:
    - .env
  environment:
    TZ: Europe/Moscow
    BOT_TIMEZONE: Europe/Moscow
  volumes:
    - /root/WhatsAppUserBot/sessions:/app/sessions
    - ./data/service_account.json:/app/data/service_account.json:ro

services:
  bot:
    <<: *bot-common
    restart: unless-stopped

  auth:
    <<: *bot-common
    command: ["auth", "--account-id", "${AUTH_ACCOUNT_ID}"]
    restart: "no"
    stdin_open: true
    tty: true
    profiles:
      - auth

  tg-bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    image: zhekop/wh-user-bot-tg-admin:main
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      SESSION_DB_PATH: "file:sessions/multi.db?_foreign_keys=on"
    volumes:
      - /root/WhatsAppUserBot/sessions:/bot/sessions
      - /root/WhatsAppUserBot/tg-bot-data:/bot/data
      - ./data/service_account.json:/bot/data/service_account.json:ro
    restart: unless-stopped
